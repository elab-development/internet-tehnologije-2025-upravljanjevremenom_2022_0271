version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: handle-time-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: handle_time
      MYSQL_ROOT_PASSWORD: root